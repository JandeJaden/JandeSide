<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课表 - JandeSide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f8f7f4;
            --card-bg: #ffffff;
            --text: #2c2c2c;
            --text-light: #8a8a8a;
            --accent: #7c9a7c;
            --accent-light: #e8f0e8;
            --border: #eae7e2;
            --shadow: 0 2px 20px rgba(0,0,0,0.04);
            --radius: 16px;
            --radius-sm: 10px;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
        }
        .header {
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 18px 36px;
            display: flex; align-items: center; justify-content: space-between;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(248,247,244,0.8);
            border-bottom: 1px solid var(--border);
        }
        .header-back {
            color: var(--text-light); text-decoration: none; font-size: 0.88em;
            font-weight: 400; letter-spacing: 0.05em; transition: color 0.3s;
        }
        .header-back:hover { color: var(--accent); }
        .header-title { font-size: 1.05em; font-weight: 500; letter-spacing: 0.08em; color: var(--text); }
        .hero {
            padding: 100px 30px 30px;
            text-align: center;
            max-width: 640px;
            margin: 0 auto;
        }
        .hero h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 2.4em;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.04em;
        }
        .hero h1 span { color: var(--accent); }
        .hero p { color: var(--text-light); font-size: 0.9em; margin-top: 8px; font-weight: 300; }
        .hero-divider { width: 36px; height: 2px; background: var(--accent); margin: 16px auto; opacity: 0.5; }
        .main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 30px 60px;
        }
        .image-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .image-card img {
            display: block;
            width: 100%;
            height: auto;
            border-radius: var(--radius);
        }
        .image-card .caption {
            padding: 16px 24px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid var(--border);
            font-size: 0.82em;
            color: var(--text-light);
        }
        .image-card .caption .label {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .image-card .caption .badge {
            background: var(--accent-light);
            color: var(--accent);
            padding: 2px 10px;
            border-radius: 8px;
            font-size: 0.75em;
            font-weight: 500;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        
        @media (max-width: 768px) {
            .header { padding: 14px 20px; }
            .header-title { font-size: 0.92em; }
            .hero { padding: 85px 20px 20px; }
            .hero h1 { font-size: 1.8em; }
            .main { padding: 0 20px 40px; }
            .image-card .caption { flex-direction: column; gap: 6px; align-items: flex-start; padding: 14px 18px 16px; font-size: 0.78em; }
        }
        @media (max-width: 480px) {
            .header { padding: 10px 14px; }
            .header-back { font-size: 0.78em; }
            .header-title { font-size: 0.85em; }
            .hero { padding: 70px 14px 16px; }
            .hero h1 { font-size: 1.4em; }
            .main { padding: 0 14px 30px; }
            .image-card .caption { padding: 10px 14px 14px; font-size: 0.72em; }
        }
    </style>
</head>
<body>
    <header class="header">
        <a class="header-back" href="/">← 返回</a>
        <span class="header-title">JandeSide</span>
        <span class="header-back" style="visibility:hidden;">← 返回</span>
    </header>
    <section class="hero">
        <h1>📖 <span>课表</span></h1>
        <div class="hero-divider"></div>
        <p>第16周课程安排</p>
    </section>
    <div class="main">
        <div class="image-card">
            <img src="../assets/images/lesson.webp" alt="本周课表" loading="lazy">
            <div class="caption">
                <span class="label">📅 2025-2026学年 · 第16周</span>
                <span class="badge">更新于 2026-06</span>
            </div>
        </div>
    </div>
</body>
</html>
