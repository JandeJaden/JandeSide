<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>自适应图片展示 - 居中响应式布局</title>
    <style>
        /* 基础样式重置，保证所有浏览器表现一致 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* body 作为全屏容器，使用 flex 实现真正的居中 */
        body {
            min-height: 100vh;          /* 确保高度至少为视口完整高度 */
            background: linear-gradient(145deg, #f5f7fa 0%, #e9edf2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, 'Segoe UI', 'Helvetica Neue', sans-serif;
            padding: 20px;
        }

        /* 图片卡片容器 —— 优雅现代且完全自适应 */
        .image-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
            padding: 1.5rem 1.5rem 1.8rem 1.5rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.3), 0 1px 2px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            width: 100%;
            max-width: 95vw;            /* 移动端不会溢出屏幕 */
            text-align: center;
        }

        /* 真正让图片自适应并完美展示的容器 */
        .image-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            background: #ffffff;
            border-radius: 1.2rem;
            overflow: hidden;           /* 保证圆角裁切，更精致 */
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05), 0 8px 20px rgba(0,0,0,0.1);
        }

        /* 核心图片样式 —— 自适应核心 */
        .responsive-img {
            max-width: 100%;            /* 最大宽度不超过父容器 */
            max-height: 75vh;           /* 最大高度不超过视口的 75% ，保证在任何屏幕都能看全 */
            width: auto;                /* 宽度自动，保持原始宽高比 */
            height: auto;               /* 高度自动，保持原始宽高比 */
            object-fit: contain;        /* 确保图片完整显示，不裁剪，不拉伸 */
            display: block;
            transition: transform 0.2s ease;
        }

        /* 可选：鼠标悬停稍微优雅放大一点点（仅视觉效果） */
        .responsive-img:hover {
            transform: scale(1.01);
        }

        /* 图片说明文字 —— 美观辅助 */
        .img-caption {
            margin-top: 1.2rem;
            font-size: 0.9rem;
            color: #2c3e4e;
            font-weight: 450;
            letter-spacing: 0.3px;
            border-top: 1px solid rgba(0,0,0,0.08);
            padding-top: 1rem;
            display: inline-block;
        }

        /* 对于超小屏幕（手机横屏或小折叠），再微调内边距和高度限制 */
        @media (max-width: 640px) {
            .image-card {
                padding: 1rem;
                border-radius: 1.5rem;
            }
            .responsive-img {
                max-height: 65vh;      /* 手机上避免图片太大占满整个屏幕而看不到说明 */
            }
            .img-caption {
                font-size: 0.8rem;
                margin-top: 0.8rem;
            }
        }

        /* 对于特别高的屏幕（如带鱼屏或竖屏显示器）保持体验 */
        @media (min-aspect-ratio: 16/9) {
            .responsive-img {
                max-height: 70vh;
            }
        }

        /* 简单的加载提示默认图片效果（使用unsplash纯风景占位图，您可替换成自己的） */
        /* 您只需要修改下面的图片链接即可 —— 本示例已提供一张高质量公共测试图片 */

</head>
